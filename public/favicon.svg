<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <!-- 牌面背景 -->
  <rect x="10" y="4" width="44" height="56" rx="4" fill="#1a1025"/>
  <rect x="10" y="4" width="44" height="56" rx="4" stroke="#c9a84c" stroke-width="2"/>

  <!-- 內框裝飾 -->
  <rect x="14" y="8" width="36" height="48" rx="2" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.5" fill="none"/>

  <!-- 中央八角星 -->
  <g transform="translate(32, 32)">
    <!-- 外圈光暈 -->
    <circle r="14" fill="none" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.3"/>

    <!-- 八角星 -->
    <polygon points="0,-12 3.4,-3.4 12,0 3.4,3.4 0,12 -3.4,3.4 -12,0 -3.4,-3.4" fill="none" stroke="#c9a84c" stroke-width="1.5"/>

    <!-- 旋轉 45 度的菱形 -->
    <polygon points="0,-8.5 8.5,0 0,8.5 -8.5,0" fill="none" stroke="#9b59b6" stroke-width="1"/>

    <!-- 中心圓點 -->
    <circle r="2.5" fill="#c9a84c"/>
    <circle r="1.2" fill="#1a1025"/>
  </g>

  <!-- 四角裝飾 -->
  <!-- 左上 -->
  <circle cx="17" cy="12" r="1.5" fill="#c9a84c" fill-opacity="0.6"/>
  <!-- 右上 -->
  <circle cx="47" cy="12" r="1.5" fill="#c9a84c" fill-opacity="0.6"/>
  <!-- 左下 -->
  <circle cx="17" cy="52" r="1.5" fill="#c9a84c" fill-opacity="0.6"/>
  <!-- 右下 -->
  <circle cx="47" cy="52" r="1.5" fill="#c9a84c" fill-opacity="0.6"/>

  <!-- 上方小星星 -->
  <polygon points="32,10 33,12.5 35.5,12.5 33.5,14 34.2,16.5 32,15 29.8,16.5 30.5,14 28.5,12.5 31,12.5" fill="#c9a84c" fill-opacity="0.7"/>

  <!-- 下方小星星 -->
  <polygon points="32,48 33,50.5 35.5,50.5 33.5,52 34.2,54.5 32,53 29.8,54.5 30.5,52 28.5,50.5 31,50.5" fill="#c9a84c" fill-opacity="0.7"/>
</svg>
